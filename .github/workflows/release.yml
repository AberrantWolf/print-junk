name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.display_name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            lib_name: libpdfium.so
            display_name: linux-x64
          - target: x86_64-apple-darwin
            runner: macos-latest
            lib_name: libpdfium.dylib
            display_name: macos-x64
          - target: aarch64-apple-darwin
            runner: macos-latest
            lib_name: libpdfium.dylib
            display_name: macos-arm64
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            lib_name: pdfium.dll
            display_name: windows-x64
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libgl1-mesa-dev libgtk-3-dev libatk1.0-dev patchelf

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ matrix.target }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-registry-

      - name: Build release binaries
        run: cargo build --release --locked --target ${{ matrix.target }}

      # --- CLI packaging (all platforms) ---

      - name: Package CLI (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          CLI_DIR="pdft-${VERSION}-${{ matrix.display_name }}"
          mkdir -p "$CLI_DIR"
          cp "target/${{ matrix.target }}/release/pdft" "$CLI_DIR/"
          tar czf "${CLI_DIR}.tar.gz" "$CLI_DIR"
          echo "CLI_ARCHIVE=${CLI_DIR}.tar.gz" >> "$GITHUB_ENV"

      - name: Package CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $Version = "$env:GITHUB_REF_NAME"
          $CliDir = "pdft-${Version}-${{ matrix.display_name }}"
          New-Item -ItemType Directory -Path $CliDir
          Copy-Item "target\${{ matrix.target }}\release\pdft.exe" "$CliDir\"
          Compress-Archive -Path "$CliDir\*" -DestinationPath "${CliDir}.zip"
          echo "CLI_ARCHIVE=${CliDir}.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      # --- GUI packaging (platform-specific native bundles) ---

      - name: Package GUI (macOS .app bundle)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          APP="PDF Tools.app"

          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Frameworks"
          mkdir -p "$APP/Contents/Resources"

          cp "target/${{ matrix.target }}/release/pdf-tools-gui" "$APP/Contents/MacOS/"
          cp "vendor/pdfium/lib/${{ matrix.lib_name }}" "$APP/Contents/Frameworks/"
          cp "crates/pdf-tools-gui/assets/icon.icns" "$APP/Contents/Resources/AppIcon.icns"

          # Substitute version into Info.plist
          sed "s/\${VERSION}/${VERSION#v}/g" \
            "crates/pdf-tools-gui/assets/Info.plist" > "$APP/Contents/Info.plist"

          # Fix rpath for .app bundle layout
          install_name_tool -add_rpath @executable_path/../Frameworks "$APP/Contents/MacOS/pdf-tools-gui"

          GUI_ARCHIVE="PDF-Tools-${VERSION}-${{ matrix.display_name }}.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "$GUI_ARCHIVE"
          echo "GUI_ARCHIVE=${GUI_ARCHIVE}" >> "$GITHUB_ENV"

      - name: Package GUI (Linux AppImage)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          APPDIR="PDF-Tools.AppDir"

          mkdir -p "$APPDIR/usr/bin" "$APPDIR/usr/lib"

          cp "target/${{ matrix.target }}/release/pdf-tools-gui" "$APPDIR/usr/bin/"
          cp "vendor/pdfium/lib/${{ matrix.lib_name }}" "$APPDIR/usr/lib/"
          cp "crates/pdf-tools-gui/assets/pdf-tools-gui.desktop" "$APPDIR/"
          cp "crates/pdf-tools-gui/assets/icon-256.png" "$APPDIR/pdf-tools-gui.png"

          # Fix rpath for AppImage layout
          patchelf --set-rpath '$ORIGIN/../lib' "$APPDIR/usr/bin/pdf-tools-gui"

          # Create AppRun symlink
          ln -s usr/bin/pdf-tools-gui "$APPDIR/AppRun"

          # Download and run appimagetool
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool-x86_64.AppImage
          ./appimagetool-x86_64.AppImage --appimage-extract-and-run "$APPDIR" \
            "PDF-Tools-${VERSION}-linux-x64.AppImage"

          echo "GUI_ARCHIVE=PDF-Tools-${VERSION}-linux-x64.AppImage" >> "$GITHUB_ENV"

      - name: Package GUI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $Version = "$env:GITHUB_REF_NAME"
          $GuiDir = "PDF-Tools-${Version}-${{ matrix.display_name }}"
          New-Item -ItemType Directory -Path $GuiDir
          Copy-Item "target\${{ matrix.target }}\release\pdf-tools-gui.exe" "$GuiDir\"
          Copy-Item "vendor\pdfium\bin\pdfium.dll" "$GuiDir\"
          Compress-Archive -Path "$GuiDir\*" -DestinationPath "${GuiDir}.zip"
          echo "GUI_ARCHIVE=${GuiDir}.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      # --- Upload both artifacts ---

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v7
        with:
          name: cli-${{ matrix.display_name }}
          path: ${{ env.CLI_ARCHIVE }}

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v7
        with:
          name: gui-${{ matrix.display_name }}
          path: ${{ env.GUI_ARCHIVE }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
